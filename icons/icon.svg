<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund mit Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6FA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund Kreis -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Mahjong Steine -->
  <!-- Stein 1 (links oben) -->
  <g transform="translate(140, 150)">
    <rect x="0" y="0" width="80" height="100" rx="8" fill="url(#cardGradient)" stroke="#1E1E2E" stroke-width="4"/>
    <rect x="0" y="0" width="80" height="8" rx="8" fill="#E5E7EB"/>
    <text x="40" y="65" font-family="Arial, sans-serif" font-size="48" fill="#22C55E" text-anchor="middle">🀄</text>
  </g>
  
  <!-- Stein 2 (rechts oben) -->
  <g transform="translate(292, 150)">
    <rect x="0" y="0" width="80" height="100" rx="8" fill="url(#cardGradient)" stroke="#1E1E2E" stroke-width="4"/>
    <rect x="0" y="0" width="80" height="8" rx="8" fill="#E5E7EB"/>
    <text x="40" y="65" font-family="Arial, sans-serif" font-size="48" fill="#3B82F6" text-anchor="middle">🎮</text>
  </g>
  
  <!-- Stein 3 (unten mittig) -->
  <g transform="translate(216, 270)">
    <rect x="0" y="0" width="80" height="100" rx="8" fill="url(#cardGradient)" stroke="#1E1E2E" stroke-width="4"/>
    <rect x="0" y="0" width="80" height="8" rx="8" fill="#E5E7EB"/>
    <text x="40" y="65" font-family="Arial, sans-serif" font-size="48" fill="#F59E0B" text-anchor="middle">🧩</text>
  </g>
  
  <!-- Dekorative Elemente (Sterne) -->
  <text x="420" y="140" font-size="36" fill="#FFD93D">✨</text>
  <text x="92" y="380" font-size="36" fill="#FFD93D">✨</text>
  <text x="420" y="420" font-size="32" fill="#FFFFFF">⭐</text>
  <text x="80" y="120" font-size="32" fill="#FFFFFF">⭐</text>
</svg>
