<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Icon Generator für Mamas Spieleseite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
    }
    h1 { color: #FF6B35; }
    canvas { 
      border: 2px solid #ddd; 
      margin: 10px;
      border-radius: 8px;
    }
    .preview {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }
    .preview-item {
      text-align: center;
    }
    button {
      background: #FF6B35;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #FF5520;
    }
    .info {
      background: #fff3cd;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border-left: 4px solid #ffc107;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Icon Generator</h1>
    
    <div class="info">
      <strong>Anleitung:</strong><br>
      1. Klicke auf "Icons Generieren"<br>
      2. Klicke auf jeden "Download" Button<br>
      3. Speichere die Dateien im <code>icons/</code> Ordner mit dem angezeigten Namen
    </div>

    <button onclick="generateAllIcons()">Icons Generieren</button>
    
    <div class="preview" id="preview"></div>
  </div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      // Hintergrund Gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#FF6B35');
      gradient.addColorStop(1, '#FF6FA8');
      
      // Runder Hintergrund
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 10, 0, Math.PI * 2);
      ctx.fill();
      
      // Schatten für Tiefe
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = size * 0.02;
      ctx.shadowOffsetY = size * 0.01;
      
      // Drei Mahjong-Steine zeichnen
      const stoneWidth = size * 0.15;
      const stoneHeight = size * 0.19;
      const cornerRadius = size * 0.015;
      
      // Funktion zum Zeichnen eines Steins
      function drawStone(x, y, emoji, color) {
        // Stein Körper
        ctx.fillStyle = '#FFFFFF';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = size * 0.015;
        ctx.shadowOffsetX = size * 0.008;
        ctx.shadowOffsetY = size * 0.008;
        
        ctx.beginPath();
        ctx.roundRect(x, y, stoneWidth, stoneHeight, cornerRadius);
        ctx.fill();
        
        // Oberer Streifen
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillStyle = '#E5E7EB';
        ctx.fillRect(x, y, stoneWidth, size * 0.015);
        
        // Border
        ctx.strokeStyle = '#1E1E2E';
        ctx.lineWidth = size * 0.008;
        ctx.beginPath();
        ctx.roundRect(x, y, stoneWidth, stoneHeight, cornerRadius);
        ctx.stroke();
        
        // Emoji
        ctx.shadowBlur = 0;
        ctx.font = `${size * 0.09}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, x + stoneWidth/2, y + stoneHeight/1.6);
      }
      
      // Steine positionieren
      const centerY = size * 0.45;
      drawStone(size * 0.27, size * 0.29, '🀄', '#22C55E');
      drawStone(size * 0.57, size * 0.29, '🎮', '#3B82F6');
      drawStone(size * 0.42, size * 0.52, '🧩', '#F59E0B');
      
      // Dekorative Sterne
      ctx.shadowBlur = 0;
      ctx.font = `${size * 0.07}px Arial`;
      ctx.fillText('✨', size * 0.82, size * 0.27);
      ctx.fillText('✨', size * 0.18, size * 0.74);
      ctx.fillText('⭐', size * 0.82, size * 0.82);
      ctx.fillText('⭐', size * 0.16, size * 0.23);
    }

    function generateAllIcons() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      
      sizes.forEach(size => {
        const container = document.createElement('div');
        container.className = 'preview-item';
        
        const canvas = document.createElement('canvas');
        drawIcon(canvas, size);
        
        const label = document.createElement('div');
        label.textContent = `${size}x${size}`;
        label.style.marginTop = '10px';
        label.style.fontWeight = 'bold';
        
        const downloadBtn = document.createElement('button');
        downloadBtn.textContent = 'Download';
        downloadBtn.onclick = () => downloadIcon(canvas, size);
        
        container.appendChild(canvas);
        container.appendChild(label);
        container.appendChild(downloadBtn);
        preview.appendChild(container);
      });
    }

    function downloadIcon(canvas, size) {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon-${size}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    // Auto-generate on load
    window.onload = generateAllIcons;
  </script>
</body>
</html>
